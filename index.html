<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة محيبس احترافية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #000;
            color: white;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        .fullscreen-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .image-content {
            position: relative;
            max-width: 100%;
            max-height: 100%;
        }

        .image-content img {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            display: block;
        }

        /* --- الشاشات --- */
        #startScreen, #chooseModeScreen { display: none; }
        #startScreen { display: flex; }

        .hotspot { position: absolute; cursor: pointer; }
        .start-btn { bottom: 8%; left: 50%; transform: translateX(-50%); width: 25%; height: 15%; }
        .tak-btn { bottom: 10%; left: 10%; width: 30%; height: 12%; }
        .jeeb-btn { bottom: 10%; right: 10%; width: 30%; height: 12%; }

        /* --- واجهة اللعبة الحية --- */
        #gameScreen {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .game-wrapper {
            position: relative;
            display: inline-block;
        }

        .game-wrapper img {
            max-width: 100vw;
            max-height: 100vh;
            display: block;
        }

        /* حاوية لكل يد */
        .hand-container {
            position: absolute;
            width: 12%; /* عرض منطقة اليد تقريباً */
            height: 20%; /* طول منطقة اليد تقريباً */
            cursor: pointer;
            overflow: hidden;
        }

        /* الطبقة التي تظهر عند الفتح (صورة open.jpg) */
        .hand-open-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('open.jpg');
            background-size: 833% 500%; /* تعويض لتكبير الصورة الأصلية داخل المربع الصغير */
            display: none; /* مخفية بالبداية */
        }

        /* أيقونة المحيبس أو الرموز */
        .hand-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            z-index: 10;
        }

        .game-info {
            position: absolute;
            top: 2%;
            width: 100%;
            z-index: 50;
            pointer-events: none;
        }

        .status-badge {
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid #f1c40f;
            display: inline-block;
        }

        .restart-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 10px;
            background: #e67e22;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="startScreen" class="fullscreen-container">
        <div class="image-content">
            <img src="start.png">
            <div class="hotspot start-btn" onclick="showChoice()"></div>
        </div>
    </div>

    <div id="chooseModeScreen" class="fullscreen-container">
        <div class="image-content">
            <img src="choose.png">
            <div class="hotspot tak-btn" onclick="startGame('tak')"></div>
            <div class="hotspot jeeb-btn" onclick="startGame('jeeb')"></div>
        </div>
    </div>

    <div id="gameScreen">
        <div class="game-info">
            <div class="status-badge">
                <span id="modeLabel">وضع الطك</span>: <span id="statusMsg">ابدي طك الأيادي!</span>
            </div>
        </div>

        <div class="game-wrapper" id="gameArea">
            <img src="close.jpg" id="bgClose">
            </div>

        <button class="restart-btn" onclick="location.reload()">العودة للقائمة</button>
    </div>

    <script>
        let ringIndex = 0;
        let isGameOver = false;
        let gameMode = 'tak';
        let remainingTak = 8;

        // مصفوفة لتحديد أماكن الأيادي (تحتاج ضبط بسيط حسب دقة الشاشة)
        const coords = [
            {t: '32%', l: '12%'}, {t: '32%', l: '30%'}, {t: '32%', l: '48%'}, {t: '32%', l: '66%'}, {t: '32%', l: '84%'},
            {t: '55%', l: '12%'}, {t: '55%', l: '30%'}, {t: '55%', l: '48%'}, {t: '55%', l: '66%'}, {t: '55%', l: '84%'}
        ];

        function showChoice() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('chooseModeScreen').style.display = 'flex';
        }

        function startGame(m) {
            gameMode = m;
            document.getElementById('chooseModeScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            initLevel();
        }

        function initLevel() {
            const area = document.getElementById('gameArea');
            ringIndex = Math.floor(Math.random() * 10);
            
            coords.forEach((pos, i) => {
                const container = document.createElement('div');
                container.className = 'hand-container';
                container.style.top = pos.t;
                container.style.left = pos.l;
                
                // إنشاء طبقة "اليد المفتوحة" التي ستظهر لاحقاً
                const openView = document.createElement('div');
                openView.className = 'hand-open-view';
                // ضبط خلفية الصورة لتناسب مكان اليد
                openView.style.backgroundPosition = `${(i % 5) * 25}% ${(i < 5 ? 0 : 100)}%`;
                
                const overlay = document.createElement('div');
                overlay.className = 'hand-overlay';

                container.appendChild(openView);
                container.appendChild(overlay);
                
                container.onclick = () => play(i, openView, overlay);
                area.appendChild(container);
            });
            updateText();
        }

        function play(i, view, txt) {
            if (isGameOver || view.style.display === 'block') return;

            view.style.display = 'block'; // فتح اليد (إظهار جزء من open.jpg)

            if (gameMode === 'jeeb') {
                if (i === ringIndex) {
                    txt.innerText = '💍';
                    msg("بات! بطل لكيت المحيبس 🎉", "#2ecc71");
                } else {
                    txt.innerText = '❌';
                    msg("خسرت! المحيبس مو هنا 😢", "#e74c3c");
                }
                revealAll();
            } else {
                if (i === ringIndex) {
                    txt.innerText = '💍';
                    msg("طاح! طكيت المحيبس بالغلط 😢", "#e74c3c");
                    revealAll();
                } else {
                    remainingTak--;
                    if (remainingTak === 0) {
                        gameMode = 'jeeb';
                        msg("عفية! هسه اطلب المحيبس من الباقيات", "#f1c40f");
                    } else {
                        msg(`فارغة! باقي لك ${remainingTak} طكات`, "#fff");
                    }
                }
            }
        }

        function msg(m, c) {
            const el = document.getElementById('statusMsg');
            el.innerText = m;
            el.style.color = c;
            updateText();
        }

        function updateText() {
            document.getElementById('modeLabel').innerText = (gameMode === 'tak' ? "وضع الطك" : "وضع الجيب");
        }

        function revealAll() {
            isGameOver = true;
            const views = document.querySelectorAll('.hand-open-view');
            const overlays = document.querySelectorAll('.hand-overlay');
            views[ringIndex].style.display = 'block';
            overlays[ringIndex].innerText = '💍';
        }
    </script>
</body>
</html>
