<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة المحيبس - النسخة النهائية</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            text-align: center;
            background-color: #000;
            color: white;
            padding: 0; margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* حاوية الشاشات (بداية، اختيار، لعبة) */
        .screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #startScreen { display: flex; } /* الشاشة الأولى */

        .img-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* جعل الصورة تملأ الصفحة بالكامل */
        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: fill; /* تملأ الشاشة بالكامل */
            display: block;
        }

        /* المناطق الشفافة للضغط (Hotspots) */
        .hotspot { position: absolute; cursor: pointer; z-index: 150; }
        
        /* زر ابدأ في شاشة البداية */
        .start-btn { bottom: 8%; width: 30%; height: 15%; left: 35%; }
        
        /* أزرار طك وجيب في شاشة الاختيار */
        .tak-btn { bottom: 10%; left: 10%; width: 35%; height: 15%; }
        .jeeb-btn { bottom: 10%; right: 10%; width: 35%; height: 15%; }

        /* زر إعادة المحاولة في وسط الشاشة من الأسفل */
        .retry-btn {
            bottom: 5%;
            left: 30%;
            width: 40%;
            height: 10%;
            /* background: rgba(255, 0, 0, 0.3); /* امسح هذا التعليق لرؤية مكان الزر */
        }

        /* تصميم الأيادي في سطر واحد بالعرض */
        .hand-target {
            position: absolute;
            width: 8%; /* عرض منطقة اليد */
            height: 20%; /* طول منطقة اليد */
            top: 45%; /* موقع الأيادي في المنتصف عرضياً */
            cursor: pointer;
            z-index: 120;
        }

        .open-view {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('open.jpg');
            background-size: 1100% 500%; /* توزيع لصورة open.jpg */
            display: none;
            z-index: 121;
        }

        .emoji-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            z-index: 130;
            pointer-events: none;
        }

        /* شريط المعلومات العلوي */
        .info-bar {
            position: absolute;
            top: 15px;
            width: 100%;
            z-index: 200;
            pointer-events: none;
        }

        .status-badge {
            background: rgba(0,0,0,0.8);
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid #f1c40f;
            display: inline-block;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="startScreen" class="screen">
        <div class="img-container">
            <img src="start.jpg">
            <div class="hotspot start-btn" onclick="goToChoice()"></div>
        </div>
    </div>

    <div id="chooseScreen" class="screen">
        <div class="img-container">
            <img src="choose.jpg">
            <div class="hotspot tak-btn" onclick="startGame('tak')"></div>
            <div class="hotspot jeeb-btn" onclick="startGame('jeeb')"></div>
        </div>
    </div>

    <div id="gameScreen" class="screen">
        <div class="info-bar"><div class="badge status-badge" id="statusText">اختر وضع اللعب</div></div>
        <div class="img-container" id="gameArea">
            <img src="close.jpg" id="mainBg">
            <div class="hotspot retry-btn" onclick="location.reload()"></div>
        </div>
    </div>

    <script>
        let ringPos = 0, isOver = false, gameMode = 'tak', takTries = 8;
        
        // إحداثيات الأيادي الـ 10 في سطر واحد بالعرض
        const coords = [
            {l: '5%'}, {l: '14%'}, {l: '23%'}, {l: '33%'}, {l: '42%'},
            {l: '52%'}, {l: '61%'}, {l: '70%'}, {l: '80%'}, {l: '89%'}
        ];

        function goToChoice() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('chooseScreen').style.display = 'flex';
        }

        function startGame(m) {
            gameMode = m;
            document.getElementById('chooseScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'flex';
            initGame();
        }

        function initGame() {
            const area = document.getElementById('gameArea');
            ringPos = Math.floor(Math.random() * 10);
            updateStatus(gameMode === 'tak' ? "طك الأيادي الفارغة" : "وين المحيبس؟ اطلب!");

            coords.forEach((p, i) => {
                const hand = document.createElement('div');
                hand.className = 'hand-target';
                hand.style.left = p.l;
                
                const open = document.createElement('div');
                open.className = 'open-view';
                // ضبط خلفية اليد المفتوحة لتناسب كل يد
                open.style.backgroundPosition = `${(i * 11)}% 50%`;
                
                const overlay = document.createElement('div');
                overlay.className = 'emoji-overlay';

                hand.appendChild(open);
                hand.appendChild(overlay);

                hand.onclick = () => {
                    if (isOver || open.style.display === 'block') return;
                    open.style.display = 'block';

                    if (gameMode === 'jeeb') {
                        if (i === ringPos) { overlay.innerText = '💍'; updateStatus("بات! بطل 🎉"); }
                        else { overlay.innerText = '❌'; updateStatus("خسرت! طاح المحيبس 😢"); }
                        endGame();
                    } else {
                        if (i === ringPos) { overlay.innerText = '💍'; updateStatus("طاح! طكيت المحيبس 😢"); endGame(); }
                        else {
                            takTries--;
                            if (takTries === 0) { gameMode = 'jeeb'; updateStatus("بقت ثنين! هسه اطلب"); }
                            else { updateStatus(`باقي ${takTries} طكات`); }
                        }
                    }
                };
                area.appendChild(hand);
            });
        }

        function updateStatus(m) { document.getElementById('statusText').innerText = m; }
        
        function endGame() { 
            isOver = true; 
            // كشف مكان المحيبس إذا لم يفتح
            const views = document.querySelectorAll('.open-view');
            const overlays = document.querySelectorAll('.emoji-overlay');
            views[ringPos].style.display = 'block';
            overlays[ringPos].innerText = '💍';
        }
    </script>
</body>
</html>
