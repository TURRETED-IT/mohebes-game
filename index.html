<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة محيبس</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #2c3e50;
            color: white;
            padding: 0;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- تصميم شاشة البداية --- */
        #startScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0b0c10; /* لون خلفية غامق يطابق حواف الصورة */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100; /* حتى تصير فوك كل شي */
        }

        .image-container {
            position: relative;
            max-width: 100%;
            max-height: 100%;
        }

        .image-container img {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            display: block;
        }

        /* هذا المربع الشفاف اللي راح نخليه فوك كلمة "ابد" بالصورة */
        .start-btn-hotspot {
            position: absolute;
            bottom: 8%; /* موقع الزر من الأسفل */
            left: 50%;
            transform: translateX(-50%);
            width: 25%; /* عرض منطقة الضغط */
            height: 15%; /* طول منطقة الضغط */
            cursor: pointer;
            border-radius: 20px;
            /* background-color: rgba(255, 0, 0, 0.3); /* امسح الأقواس مال هذا السطر إذا تريد تشوف مكان الزر بالضبط */
        }

        /* --- تصميم اللعبة --- */
        #gameScreen {
            display: none; /* مخفية بالبداية */
            padding: 20px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            color: #f1c40f;
        }

        .message {
            font-size: 1.5em;
            font-weight: bold;
            margin: 20px;
            height: 30px;
        }

        .hands-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 500px;
            margin: 30px auto;
        }

        .hand {
            font-size: 50px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s, background-color 0.2s;
            background: #ecf0f1;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
        }

        .hand:hover {
            transform: scale(1.1);
            background: #bdc3c7;
        }

        .hand.open {
            background: #e74c3c;
            cursor: default;
        }

        .hand.winner {
            background: #2ecc71;
            cursor: default;
        }

        .btn {
            background-color: #d35400;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #e67e22;
        }
    </style>
</head>
<body>

    <div id="startScreen">
        <div class="image-container">
            <img src="Gemini_Generated_Image_zzp8uzzp8uzzp8uz.png" alt="شاشة بداية لعبة المحيبس">
            <div class="start-btn-hotspot" onclick="startGame()"></div>
        </div>
    </div>

    <div id="gameScreen">
        <h1>لعبة المحيبس 💍</h1>
        <p class="message" id="message">وين المحيبس؟ اختار إيد!</p>
        
        <div class="hands-grid" id="handsGrid">
            </div>
        
        <button class="btn" onclick="initGame()">العب من جديد</button>
    </div>

    <script>
        // دالة لإخفاء شاشة البداية وإظهار اللعبة
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            initGame(); // تشغيل اللعبة
        }

        let ringPosition = 0;
        let gameOver = false;
        const totalHands = 10;

        function initGame() {
            const grid = document.getElementById('handsGrid');
            const messageEl = document.getElementById('message');
            
            grid.innerHTML = '';
            messageEl.innerText = 'وين المحيبس؟ اختار إيد!';
            messageEl.style.color = 'white';
            
            gameOver = false;
            ringPosition = Math.floor(Math.random() * totalHands);

            for (let i = 0; i < totalHands; i++) {
                const handDiv = document.createElement('div');
                handDiv.className = 'hand';
                handDiv.innerText = '✊'; 
                handDiv.onclick = () => checkHand(i, handDiv);
                grid.appendChild(handDiv);
            }
        }

        function checkHand(index, element) {
            if (gameOver || element.classList.contains('open') || element.classList.contains('winner')) return;

            const messageEl = document.getElementById('message');

            if (index === ringPosition) {
                element.innerText = '💍';
                element.classList.add('winner');
                messageEl.innerText = 'بات! لكيت المحيبس 🎉';
                messageEl.style.color = '#2ecc71';
                gameOver = true;
                openRemainingHands();
            } else {
                element.innerText = '🖐️';
                element.classList.add('open');
                messageEl.innerText = 'طاح! مو هنا، جرب غير إيد.';
            }
        }

        function openRemainingHands() {
            const hands = document.querySelectorAll('.hand');
            hands.forEach((hand, index) => {
                if (index !== ringPosition) {
                    hand.innerText = '🖐️';
                    hand.style.cursor = 'default';
                }
            });
        }
    </script>

</body>
</html>
